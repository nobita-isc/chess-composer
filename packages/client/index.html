<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Trainer Composer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/chessground.base.css">
    <link rel="stylesheet" href="/css/chessground.brown.css">
    <link rel="stylesheet" href="/css/chessground.cburnett.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-logo">&#9819;</span>
                <span class="sidebar-title">Chess Trainer</span>
            </div>

            <nav class="sidebar-nav">
                <button id="nav-generate" class="sidebar-nav-item active" title="Generate Puzzles">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span class="sidebar-label">Generate</span>
                </button>
                <button id="exercises-btn" class="sidebar-nav-item" title="Student Exercises">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                    <span class="sidebar-label">Exercises</span>
                </button>
                <button id="admin-btn" class="sidebar-nav-item" title="Reports">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span class="sidebar-label">Reports</span>
                </button>
                <div id="sidebar-dynamic-nav"></div>
            </nav>

            <div class="sidebar-footer" id="sidebar-footer">
                <!-- User info and logout injected by JS -->
            </div>
        </aside>

        <main class="main-content" id="main-content">
            <div id="view-generate">
                <div class="main-header main-header-row">
                    <div>
                        <h1 class="page-title">Generate Puzzles</h1>
                        <p class="page-subtitle">Create chess puzzles from the database</p>
                    </div>
                    <button id="export-btn" class="btn-outline" disabled>Export FEN List</button>
                </div>

                <div class="controls">
                    <div class="control-group control-group-grow">
                        <label>Themes</label>
                        <div id="theme-select-container"></div>
                    </div>

                    <div class="control-group control-group-grow">
                        <label for="rating-range">Rating Range</label>
                        <select id="rating-range" class="rating-select">
                            <option value="">All Ratings</option>
                            <option value="1000-1500">1000-1500 (Beginner)</option>
                            <option value="1500-2000">1500-2000 (Intermediate)</option>
                            <option value="2000-2500">2000-2500 (Advanced)</option>
                            <option value="2500-3000">2500+ (Expert)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="puzzle-count">Count</label>
                        <input type="number" id="puzzle-count" min="1" max="20" value="5" class="puzzle-count">
                    </div>

                    <button id="generate-btn" class="generate-btn">Generate</button>
                </div>

                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Generating puzzles...</p>
                </div>

                <div id="results" class="results">
                    <!-- Puzzles will be dynamically inserted here -->
                </div>
            </div>

            <div id="view-container" style="display: none;"></div>
        </main>
    </div>

    <!-- Main application -->
    <script type="module" src="/src/index.js"></script>
</body>
</html>
